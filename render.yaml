services:
  - type: web
    name: ai-chat-assistant-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: "Gemini 3.1 Flash-Lite"
      - key: ALLOWED_ORIGINS
        value: "*"
