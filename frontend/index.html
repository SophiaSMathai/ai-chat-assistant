<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova &mdash; AI Chat Assistant</title>
  <meta name="description" content="A minimalist AI chat assistant powered by Gemini 3.1 Flash-Lite." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <!-- Markdown parsing for AI responses -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js" defer></script>
  <!-- Lightweight HTML sanitizer to keep parsed Markdown safe -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js" defer></script>

  <!-- Backend API URL configuration -->
  <script>window.NOVA_API_BASE_URL = window.NOVA_API_BASE_URL || "https://ai-chat-assistant-u9e0.onrender.com";</script>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="dark">

  <div class="app">

    <!-- Mobile overlay (click to close drawer) -->
    <div class="overlay" id="overlay"></div>

    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__top">
        <div class="brand">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">Nova</span>
        </div>
        <button class="icon-btn sidebar__close" id="closeSidebar" aria-label="Close sidebar">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <button class="new-chat-btn" id="newChatBtn">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        New chat
      </button>

      <nav class="session-list" id="sessionList" aria-label="Previous sessions">
        <p class="session-list__label">Recent</p>
        <button class="session-item session-item--active" data-mock="true">
          <svg class="session-item__icon" viewBox="0 0 24 24" width="16" height="16"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>
          <span>Current conversation</span>
        </button>
        <button class="session-item" data-mock="true">
          <svg class="session-item__icon" viewBox="0 0 24 24" width="16" height="16"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>
          <span>Weekend trip itinerary ideas</span>
        </button>
        <button class="session-item" data-mock="true">
          <svg class="session-item__icon" viewBox="0 0 24 24" width="16" height="16"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>
          <span>Debugging a FastAPI 500 error</span>
        </button>
        <button class="session-item" data-mock="true">
          <svg class="session-item__icon" viewBox="0 0 24 24" width="16" height="16"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>
          <span>Explain quicksort like I'm 5</span>
        </button>
      </nav>

      <div class="sidebar__bottom">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle light and dark mode">
          <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" width="18" height="18"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
          <span id="themeLabel">Dark mode</span>
        </button>
        <div class="profile">
          <div class="profile__avatar">M</div>
          <div class="profile__meta">
            <span class="profile__name">User</span>
            <span class="profile__sub">Free plan</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- ============ MAIN CHAT AREA ============ -->
    <main class="main">
      <header class="main__header">
        <button class="icon-btn" id="openSidebar" aria-label="Open sidebar">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>

        <div class="model-indicator">
          <span class="model-indicator__dot" aria-hidden="true"></span>
          Gemini 3.1 Flash-Lite
        </div>

        <button class="icon-btn header__clear" id="clearChatBtn" aria-label="Clear chat">
          <svg viewBox="0 0 24 24" width="19" height="19"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2m2 0v14a1 1 0 01-1 1H7a1 1 0 01-1-1V6h12z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </button>
      </header>

      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <div class="empty-state__mark" aria-hidden="true"></div>
          <h1>What can I help you build today?</h1>
          <p>Ask a question, paste some code, or brainstorm an idea &mdash; Nova remembers the conversation as you go.</p>
          <div class="suggestion-grid">
            <button class="suggestion-card" data-prompt="Explain the difference between REST and GraphQL in simple terms.">
              <strong>Explain a concept</strong>
              <span>REST vs. GraphQL, simply</span>
            </button>
            <button class="suggestion-card" data-prompt="Write a Python function that checks if a string is a palindrome.">
              <strong>Write some code</strong>
              <span>Palindrome checker in Python</span>
            </button>
            <button class="suggestion-card" data-prompt="Give me 5 creative name ideas for a coffee subscription startup.">
              <strong>Brainstorm ideas</strong>
              <span>Name a coffee startup</span>
            </button>
            <button class="suggestion-card" data-prompt="Summarize the plot of Frankenstein in three sentences.">
              <strong>Summarize something</strong>
              <span>Frankenstein, in 3 sentences</span>
            </button>
          </div>
        </div>
        <!-- Message bubbles are appended here dynamically -->
      </div>

      <div class="composer">
        <div class="composer__inner">
          <div class="composer__utility">
            <button class="chip-btn" id="voiceBtn" type="button" title="Voice input (mockup)">
              <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 15a3 3 0 003-3V6a3 3 0 00-6 0v6a3 3 0 003 3z" stroke="currentColor" stroke-width="1.6" fill="none"/><path d="M19 11v1a7 7 0 01-14 0v-1M12 19v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg>
            </button>
            <span class="char-counter" id="charCounter">0 / 4000</span>
          </div>

          <div class="composer__row">
            <textarea
              id="messageInput"
              class="composer__textarea"
              placeholder="Message Nova..."
              rows="1"
              maxlength="4000"
              aria-label="Message input"
            ></textarea>
            <button class="send-btn" id="sendBtn" aria-label="Send message" disabled>
              <svg viewBox="0 0 24 24" width="18" height="18"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            </button>
          </div>
        </div>
        <p class="composer__hint">Nova can make mistakes. Consider checking important information.</p>
      </div>
    </main>
  </div>

  <!-- Typing indicator template -->
  <template id="typingTemplate">
    <div class="message message--ai message--typing">
      <div class="message__avatar message__avatar--ai">N</div>
      <div class="message__bubble">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </template>

  <!-- Message bubble template -->
  <template id="messageTemplate">
    <div class="message">
      <div class="message__avatar"></div>
      <div class="message__body">
        <div class="message__bubble"></div>
        <div class="message__actions">
          <button class="copy-btn" aria-label="Copy message">
            <svg class="copy-btn__icon-copy" viewBox="0 0 24 24" width="14" height="14"><rect x="9" y="9" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.6" fill="none"/><path d="M5 15V5a2 2 0 012-2h10" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>
            <svg class="copy-btn__icon-check" viewBox="0 0 24 24" width="14" height="14" style="display:none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </button>
        </div>
      </div>
    </div>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
